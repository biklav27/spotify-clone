<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Navbar Menu -->
    <nav class="flex justify-between items-center p-4 bg-black text-white">
      <!--left side -->
      <div class="flex gap-10 items-center">
        <!-- logo div -->
        <div>
          <a href="#home"
            ><img
              src="assets/spotify-brands-solid-full.svg"
              alt="logo"
              class="w-13 h-13"
          /></a>
        </div>
        <!-- home and search bar div -->
        <div class="flex gap-4 items-center">
          <!-- home icon -->
          <div>
            <a href="#home">
              <img
                src="assets/house-solid-full.svg"
                alt="home"
                class="w-12 h-12 p-1 bg-[#191414] rounded-full"
              />
            </a>
          </div>
          <!-- search bar -->
          <div class="relative">
            <input
              type="text"
              placeholder="What do you want to play?"
              class="w-120 p-4 rounded-4xl bg-[#191414] text-white placeholder:text-gray-300 placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-white"
            />
          </div>
        </div>
      </div>
      <!-- nav menu and signup -->
      <div class="flex items-center gap-4">
        <!-- nav links -->
        <div class="flex items-center gap-3 text-slate-300 text-sm font-bold">
          <a href="#premium" class="hover:text-white">Premium</a>
          <a href="#support" class="hover:text-white">Support</a>
          <a href="#download" class="hover:text-white">Download</a>
          <p class="text-4xl font-thin">|</p>
        </div>

        <div
          class="flex gap-1 text-slate-300 text-sm font-bold items-center hover:text-white hover:animate-bounce hover:animate-duration-1000 hover:cursor-pointer"
        >
          <img
            src="assets/circle-down-regular-full.svg"
            alt="Download"
            class="w-6 h-6"
          />
          <p>Install App</p>
        </div>
        <!-- signup button -->
        <div class="flex gap-4 text-sm items-center">
          <button
            class="text-slate-300 hover:text-white font-bold hover:cursor-pointer"
          >
            Sign up
          </button>
          <button
            class="bg-white w-25 py-3.5 rounded-3xl font-bold text-black hover:bg-slate-200 hover:animate-pulse hover:cursor-pointer"
          >
            Log in
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
